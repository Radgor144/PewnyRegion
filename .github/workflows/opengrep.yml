name: Opengrep Analysis

on:
  push:

jobs:
  opengrep-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Opengrep
        run: |
          curl -L https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.opengrep/cli/latest" >> $GITHUB_PATH

      - name: Run Scan
        run: opengrep scan --config=auto