######### POSTGRESQL #########
spring.r2dbc.url=${SPRING_R2DBC_URL:r2dbc:postgresql://postgres:5432/regions}
spring.r2dbc.username=${SPRING_R2DBC_USERNAME:postgres}
spring.r2dbc.password=${SPRING_R2DBC_PASSWORD:postgres}

######### Flyway #########
spring.flyway.url=${SPRING_FLYWAY_URL:jdbc:postgresql://postgres:5432/regions}
spring.flyway.user=${SPRING_FLYWAY_USER:postgres}
spring.flyway.password=${SPRING_FLYWAY_PASSWORD:postgres}
spring.flyway.locations=classpath:db/migration