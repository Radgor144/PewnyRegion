services:
  postgres:
    image: cgr.dev/chainguard/postgres:latest
    container_name: regions-postgres
    environment:
      POSTGRES_DB: regions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  analytics-service:
    container_name: region-analytics-service
    image: region-analytics-service:latest
    build:
      context: ..
      dockerfile: region-analytics-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - postgres
